<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CLO:AI - 스마트 스타일러</title>
    <script>
        // 메시지 표시를 위한 안전한 함수
        function showNotification(message) {
            const overlay = document.createElement('div');
            overlay.style.position = 'fixed';
            overlay.style.top = '20px';
            overlay.style.right = '20px';
            overlay.style.padding = '15px 20px';
            overlay.style.background = '#334155';
            overlay.style.color = '#fff';
            overlay.style.borderRadius = '8px';
            overlay.textContent = message;
            document.body.appendChild(overlay);
            setTimeout(() => overlay.remove(), 3000);
        }

        // renderCodiResultUI 정의 추가
        function renderCodiResultUI(message) {
            console.log("UI 갱신:", message);
            // 필요한 UI 로직 구현부
        }

        function wearCodi(currentTop, currentBottom, currentShoes) {
            if (!currentTop || !currentBottom || !currentShoes) return;
            
            // 상태 변경 로직
            [currentTop, currentBottom, currentShoes].forEach(item => {
                if (!(item.categories.includes('신발') || item.categories.includes('악세사리'))) {
                    item.status = '세탁중';
                }
            });

            // alert 대신 안전한 알림 사용
            showNotification('코디 착용 기록이 완료되었습니다.');
            
            // 기타 로직 실행
            // resetRecommendUI(); 
            // saveToStorage();
        }
    </script>
</head>
<body>
    <h1>CLO:AI 스타일러 수정판</h1>
    <button onclick="wearCodi({categories:['상의'], status:'입음'}, {categories:['하의'], status:'입음'}, {categories:['신발'], status:'입음'})">
        코디 착용 테스트
    </button>
</body>
</html>
